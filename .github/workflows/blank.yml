# Name of the workflow as it appears in the GitHub Actions UI
name: Android CI

# Controls when the workflow will run
on:
  # Trigger on pushes to the main branch
  push:
    branches: [ "main" ]
  # Trigger on pull requests targeting the main branch
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs
jobs:
  # Define a single job called "build"
  build:
    # Use the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed
    steps:
      # Step 1: Check out the repository code so the workflow can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 which is required by the Android Gradle plugin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Gradle dependencies to speed up subsequent builds
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          # Path to the Gradle cache directory
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Key based on the hash of Gradle build files and wrapper properties
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          # Restore the most recent cached version if the exact key does not match
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Grant execute permission to the Gradle wrapper script
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Step 5: Build the debug APK; the --stacktrace flag provides detailed output on failure
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Step 6: Run all unit tests; fails the workflow if any test fails
      - name: Run unit tests
        run: ./gradlew test --stacktrace

      # Step 7: Upload the generated debug APK as a workflow artifact for download
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
